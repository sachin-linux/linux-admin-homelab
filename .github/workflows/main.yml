      - main

jobs:
  build-add-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Say Hello
        run: echo "Pipeline is working!"

      - name: Check Linux version
